model:
  vit:
    patch_size: 16
    image_size: 224
    hidden_size: 256
    num_layers: 6
    num_heads: 4
    intermediate_size: 1024
  projector:
    hidden_size: 256
    projector_hidden_size: 512
  decoder:
    hidden_size: 256
    num_layers: 6
    num_heads: 8
    head_dim: 32
    intermediate_size: 512
    vocab_size: 50257
    max_position_embeddings: 2048
    rope_theta: 10000.0

data:
  # flickr8k_hf | flickr8k | csv | drivelm_nus
  dataset_type: drivelm_nus
  synthetic: false
  max_samples: null
  max_seq_length: 256
  prompt_template: null
  nuscenes_root: /content/nuscenes/samples

training:
  batch_size: 32
  learning_rate: 0.0003
  weight_decay: 0.1
  num_epochs: 30
  gradient_clip: 1.0
  checkpoint_dir: checkpoints
  resume: null
